<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>

    <linearGradient id="midGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
  </defs>

  <!-- 网格 -->
  <g transform="translate(28,28)">
    <!-- 左列 -->
    <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#blueGrad)"/>
    <rect x="0" y="72" width="56" height="56" rx="12" fill="url(#blueGrad)"/>
    <rect x="0" y="144" width="56" height="56" rx="12" fill="url(#blueGrad)"/>

    <!-- 中列 -->
    <rect x="72" y="0" width="56" height="56" rx="12" fill="url(#midGrad)"/>
    <rect x="72" y="72" width="56" height="56" rx="12" fill="url(#midGrad)"/>
    <rect x="72" y="144" width="56" height="56" rx="12" fill="url(#midGrad)"/>

    <!-- 右列 -->
    <rect x="144" y="0" width="56" height="56" rx="12" fill="url(#orangeGrad)"/>
    <rect x="144" y="72" width="56" height="56" rx="12" fill="url(#orangeGrad)"/>
    <rect x="144" y="144" width="56" height="56" rx="12" fill="url(#orangeGrad)"/>
  </g>

  <!-- 推导路径（优化直线） -->
  <g stroke="#FFFFFF" stroke-width="14" stroke-linecap="round">
    <line x1="56" y1="200" x2="180" y2="76"/>
  </g>

  <!-- 起点 -->
  <circle cx="56" cy="200" r="14" fill="#FFFFFF"/>

  <!-- 优化箭头（更锐利） -->
  <polygon points="160,64,208,48,192,96

" fill="#FFFFFF"/>
</svg>